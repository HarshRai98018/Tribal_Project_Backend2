# Server
server.port=${PORT:8080}

# Spring Datasource - Optimized for Azure/Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# App Properties
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION:86400000}

# Recaptcha
app.recaptcha.enabled=${APP_RECAPTCHA_ENABLED:true}
app.recaptcha.site-key=${APP_RECAPTCHA_SITE_KEY}
app.recaptcha.secret-key=${APP_RECAPTCHA_SECRET_KEY}

# Supabase
app.supabase.url=${APP_SUPABASE_URL}
app.supabase.service-role-key=${APP_SUPABASE_SERVICE_ROLE_KEY}
app.supabase.bucket-name=${APP_SUPABASE_BUCKET_NAME}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

