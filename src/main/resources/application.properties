# Server
# Azure App Service (Java SE) automatically exposes the app on port 8080 and proxies
# external 80/443 traffic to it. Use the platform-provided PORT env var when present
# (set by Docker/container deployments), otherwise default to 8080.
# Do NOT rely on SERVER_PORT=80 — binding to port 80 fails as non-root on Linux.
server.port=${PORT:8080}

# Spring Datasource - Optimized for Azure/Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - tuned for Azure/container startup performance
# Default pool size is 10 (too many connections to a remote DB at startup).
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
# Wait up to 10 s to acquire a connection (prevents indefinite blocking).
spring.datasource.hikari.connection-timeout=10000
# Give up to 30 s to obtain the very first connection before failing startup.
# Keeping this short ensures a clear error log instead of a silent 230 s timeout.
spring.datasource.hikari.initialization-fail-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Defer non-essential bean initialization to first use - reduces startup time significantly.
spring.main.lazy-initialization=true

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# App Properties
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION:86400000}

# Recaptcha
app.recaptcha.enabled=${APP_RECAPTCHA_ENABLED:true}
app.recaptcha.site-key=${APP_RECAPTCHA_SITE_KEY}
app.recaptcha.secret-key=${APP_RECAPTCHA_SECRET_KEY}

# Supabase
app.supabase.url=${APP_SUPABASE_URL}
app.supabase.service-role-key=${APP_SUPABASE_SERVICE_ROLE_KEY}
app.supabase.bucket-name=${APP_SUPABASE_BUCKET_NAME}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

